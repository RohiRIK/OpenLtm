name: Publish to npm

# Trigger directly on the version tag (not on `release: published`): a release
# created by the Release workflow's GITHUB_TOKEN does not trigger downstream
# workflows, so chaining off it silently skips publishing. workflow_dispatch
# gives a manual re-run handle.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write    # for npm provenance

jobs:
  publish:
    name: Publish @rohirik/* packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      # NOTE: no `registry-url` — it makes setup-node write an .npmrc with an
      # empty _authToken (NODE_AUTH_TOKEN is unset), which npm then uses instead
      # of falling back to OIDC, causing a 404 on publish. Leaving it out lets
      # OIDC trusted publishing authenticate the publish.
      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # OIDC trusted publishing needs npm >= 11.5 (the node-20 bundled npm is older)
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      # workspace:* → concrete version before publishing
      - name: Resolve workspace dependencies
        run: |
          VERSION=$(node -p "require('./package.json').version")
          for f in packages/adapter-opencode/package.json packages/adapter-pi/package.json; do
            sed -i "s|\"workspace:\*\"|\"^${VERSION}\"|g" "$f"
          done

      # No NODE_AUTH_TOKEN: auth is via OIDC trusted publishing (configured per
      # package on npmjs.com). id-token: write above lets npm mint the OIDC token.
      - name: Publish openltm-core
        working-directory: packages/openltm-core
        run: npm publish --provenance

      - name: Publish opencode adapter
        working-directory: packages/adapter-opencode
        run: npm publish --provenance

      - name: Build pi extension
        working-directory: packages/adapter-pi
        run: bun run build

      - name: Publish pi extension
        working-directory: packages/adapter-pi
        run: npm publish --provenance
